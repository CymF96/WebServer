

### **Complete Configuration File**
```properties
# Server 1: Handles requests on port 8080
server {
    host: 127.0.0.1 #specifies the IP address the server will bind to
    port: 8080 8081 8082  # Multi-port support
    server_names: simpletest.com www.simpletest.com
    client_max_body_size: 10M
    max_connections: 100
    keep_alive: on
    keep_alive_timeout: 5s
	#specifies how long the server will keep a persistent connection open if no new requests are received.
    max_keep_alive_requests: 100
    client_timeout: 10s
    request_timeout: 5s
    error_page: default /documents/errors/default.html
    error_page: 404 /documents/errors/404.html #required to handle requrest for non-existent resources.
    error_page: 401 /documents/errors/401.html #optional 401 unauthorized 
    error_page: 400 /documents/errors/400.html #optional 400 bad request
    error_page: 500 /documents/errors/500.html #500 internak server error 
	#(unhandled exceptions, misconfigured CGI scripts)
	#you need to provide default error pages for common HTTP errors.

    location /:
        methods: GET POST DELETE
        root: /documents
        index: index.html
        autoindex: on

    location /cgi-bin/:
        methods: GET POST
        root: /cgi-bin
        cgi: .php /usr/bin/php-cgi
        cgi: .py /usr/bin/python3

}

# Server 2: Handles requests on port 9090
server {
    host: 127.0.0.1
    port: 9090
    server_names: test.com
    client_max_body_size: 5M
    max_connections: 50
    keep_alive: on
    keep_alive_timeout: 10s
    max_keep_alive_requests: 50
    client_timeout: 15s
    request_timeout: 10s
    error_page: 404 /errors/404.html
    error_page: 500 /errors/500.html

    location /:
        methods: GET
        root: /test_documents
        index: index.html
        autoindex: off

    location /api/:
        methods: GET POST
        root: /api
        index: api.html
        autoindex: off
}

# Server 3: Handles requests on port 7070
server {
    host: 127.0.0.1
    port: 7070
    server_names: api.example.com
    client_max_body_size: 15M
    max_connections: 200
    keep_alive: on
    keep_alive_timeout: 8s
    max_keep_alive_requests: 200
    client_timeout: 20s
    request_timeout: 10s
    error_page: 404 /errors/api_404.html
    error_page: 500 /errors/api_500.html

    location /:
        methods: GET POST
        root: /api_documents
        index: index.html
        autoindex: on

    location /cgi-bin/:
        methods: GET POST
        root: /api_cgi
        cgi: .py /usr/bin/python3
        cgi: .sh /bin/bash
}
```

---

# ### **Features Included**
# 1. **Multi-Port Support**:
#    - The first server listens on multiple ports (`8080`, `8081`, `8082`).
#    - Additional servers listen on separate ports (`9090`, `7070`).

# 2. **Multiple Servers**:
#    - Three distinct servers are defined, each with its own `host`, `port`, and configuration.

# 3. **Persistent Connections**:
#    - `keep_alive`, `keep_alive_timeout`, and `max_keep_alive_requests` are configured for all servers.

# 4. **Error Handling**:
#    - Custom error pages are defined for common HTTP status codes (`404`, `500`).

# 5. **Logging**:
#    - `access_log` and `error_log` directives are included for debugging and monitoring.

# 6. **Routes (`location` blocks)**:
#    - Each server has multiple `location` blocks with specific configurations:
#      - Allowed HTTP methods (`methods`).
#      - Root directories (`root`).
#      - Default files for directories (`index`).
#      - Directory listing (`autoindex`).
#      - File uploads (`upload_dir`).
#      - CGI execution (`cgi`).
#      - HTTP redirects (`redirect`).

# 7. **Client and Request Limits**:
#    - `client_max_body_size` limits the size of client request bodies.
#    - `max_connections` limits the number of simultaneous connections.
#    - `client_timeout` and `request_timeout` ensure the server does not hang indefinitely.

# ---

# ### **How This Meets the Project Requirements**
# 1. **Multiple Ports**:
#    - The configuration supports multiple ports for a single server and multiple servers.

# 2. **Persistent Connections**:
#    - Persistent connections are enabled with `keep_alive` and related directives.

# 3. **Stress Testing**:
#    - `max_connections` and timeout settings ensure the server can handle stress testing with tools like `siege`.

# 4. **CGI Execution**:
#    - CGI execution is configured for `.php`, `.py`, and `.sh` files.

# 5. **Error Pages**:
#    - Custom error pages are defined for `404` and `500` status codes.

# 6. **File Uploads**:
#    - File uploads are supported with the `upload_dir` directive.

# 7. **Route-Specific Configurations**:
#    - Each `location` block has specific settings for methods, roots, and other behaviors.

# ---

# ### **How to Test This Configuration**
# 1. **Run the Server**:
#    - Start your server with this configuration file:
#      ```bash
#      ./webserv configuration_file.conf
#      ```

# 2. **Test Multi-Port Support**:
#    - Use `curl` to test each port:
#      ```bash
#      curl http://127.0.0.1:8080
#      curl http://127.0.0.1:8081
#      curl http://127.0.0.1:9090
#      curl http://127.0.0.1:7070
#      ```

# 3. **Test Persistent Connections**:
#    - Use `curl` with `--keepalive-time`:
#      ```bash
#      curl -v --keepalive-time 5 http://127.0.0.1:8080
#      ```

# 4. **Stress Test with Siege**:
#    - Install Siege and run a stress test:
#      ```bash
#      siege -c 50 -t 30S http://127.0.0.1:8080
#      ```

# 5. **Test CGI Execution**:
#    - Access a CGI script (e.g., `.php` or `.py`) through the `/cgi-bin/` route.

# 6. **Test File Uploads**:
#    - Use `curl` to upload a file:
#      ```bash
#      curl -X POST -F "file=@test.txt" http://127.0.0.1:8080/uploads/
#      ```

